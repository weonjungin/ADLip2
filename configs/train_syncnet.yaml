data:
  root: /home/ihjung/HDTF_ssd/processed
  samples_per_video: 100
  splits_dir: /home/ihjung/2026/ADLip2/data/splits

model:
  alpha: 0.35 #0.2 ->  0.35,0.4
  dim: 512
  num_heads: 8
  spatial_layers: 2
  temporal_layers: 2
  audio_len: 5 
  ffn_dim_ratio: 4
  dropout: 0.1

loss:
  lambda_latent: 0.25 #0.5 -> 0.3,0.25
  lambda_same: 0.01 #0.02 ->0.01
  lambda_diff: 0.01
  diff_margin: 0.3
  lambda_silence: 0.02 #0.05->0.02
  lambda_delta_reg: 0.01
  lambda_smooth: 0.05
  lambda_mouth: 0.0
  lambda_sync: 0.15 #0.005->0.1,0.15
  sync_margin: 0.2

syncnet:
  ckpt_path: /home/ihjung/MuseTalk/models/syncnet/latentsync_syncnet.pt

train:
  epochs: 30
  lr: 3e-6
  batch_size: 2
  num_workers: 4
  seed: 42

vae:
  model_name: stabilityai/sd-vae-ft-mse

results:
  root: /home/ihjung/2026/ADLip2/results

sample:
  save_every: 5

run_name: batch2_alpha0.4_sync0.15