run_name: stage3_ref1_b8_gan_from_sync04
data:
  root: /data/ihjung/HDTF_ssd/processed
  samples_per_video: 100
  splits_dir: /home/ubuntu/code/ihjung/ADLip2/data/splits
  ref_repeat: true
model:
