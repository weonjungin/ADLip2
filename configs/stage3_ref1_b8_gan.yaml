  alpha: 0.35
  dim: 512
  num_heads: 8
  spatial_layers: 2
  temporal_layers: 2
  audio_len: 5
  ffn_dim_ratio: 4
  dropout: 0.1
  ndf: 32
loss:
  lambda_latent: 0.25
  lambda_same: 0.01
  lambda_diff: 0.0
  diff_margin: 0.9
  lambda_silence: 0.01
  lambda_delta_reg: 0.005
  lambda_smooth: 0.005
  lambda_mouth: 0.0
  lambda_sync: 0.4
  sync_margin: 0.2
  sync_temperature: 0.07
  lambda_adv: 0.01
  lambda_fm: 0.0
  lambda_sync_fm: 0.03
syncnet:
  ckpt_path: /home/ubuntu/code/jiweon/MuseTalk/models/syncnet/latentsync_syncnet.pt
train:
  epochs: 30
  lr: 3.0e-06
  lr_d: 5.0e-06 #1e-5로 바꿔보기.. 
  d_freq: 4 #2 로 바꿔보기 
  batch_size: 8
  num_workers: 4
  seed: 42
vae:
  model_name: stabilityai/sd-vae-ft-mse
results:
  root: /home/ubuntu/code/ihjung/ADLip2/results
sample:
  save_every: 5
