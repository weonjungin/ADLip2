data:
  root: /home/ihjung/HDTF_ssd/processed
  samples_per_video: 50
  splits_dir: /home/jiweon/projects/ADLip2/data/splits

model:
  alpha: 0.35
  dim: 512
  num_heads: 8
  spatial_layers: 2
  temporal_layers: 2
  audio_len: 5
  ffn_dim_ratio: 4
  dropout: 0.1

loss:
  lambda_latent: 0.5
  lambda_same: 0.01
  lambda_diff: 0.01
  diff_margin: 0.3
  lambda_silence: 0.02
  lambda_delta_reg: 0.01
  lambda_smooth: 0.05
  lambda_mouth: 0.0
  lambda_sync: 0.1
  sync_margin: 0.2
  lambda_our: 0.05
  our_margin: 1.0
  our_lambda_pos: 1.0
  our_lambda_neg: 1.8

syncnet:
  ckpt_path: /home/ihjung/MuseTalk/models/syncnet/latentsync_syncnet.pt

our:
  ckpt_path: /home/jiweon/projects/lip-sync-score/logs/syncnet_hdtf/checkpoints/best.pth
  in_frames: 16
  emb_dim: 256
  pooling: attn
  lip_in_channels: 4

train:
  epochs: 30
  lr: 1e-5
  batch_size: 2
  num_workers: 4
  seed: 42

vae:
  model_name: stabilityai/sd-vae-ft-mse

results:
  root: /home/jiweon/projects/ADLip2/results

sample:
  save_every: 5

run_name: C3
