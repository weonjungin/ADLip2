  lambda_delta_reg: 0.005
  lambda_smooth: 0.005
  lambda_mouth: 0.0
  lambda_sync: 0.4
  sync_margin: 0.2
  sync_temperature: 0.07
  lambda_adv: 0.01
  lambda_fm: 0.0
  lambda_sync_fm: 0.03
  lambda_our: 0.15
  our_margin: 1.0
  our_lambda_pos: 1.0
  our_lambda_neg: 2.5

syncnet:
  ckpt_path: /home/ihjung/MuseTalk/models/syncnet/latentsync_syncnet.pt

our:
  ckpt_path: /home/jiweon/projects/lip-sync-score/logs/syncnet_hdtf/checkpoints/best.pth
  in_frames: 16
  emb_dim: 256
  pooling: attn
  lip_in_channels: 4

train:
  epochs: 30
  extra_epochs: 30
  lr: 3.0e-06
  lr_d: 5.0e-06
  d_freq: 4
  batch_size: 2
  num_workers: 4
  seed: 42

vae:
  model_name: stabilityai/sd-vae-ft-mse

results:
  root: /home/jiweon/projects/ADLip2/results

