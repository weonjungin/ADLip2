run_name: G1

data:
  root: /media/HDD/jiweon/processed/HDTF/HDTF_processed
  samples_per_video: 100
  splits_dir: /home/jiweon/projects/ADLip2/data/splits
  ref_repeat: true

model:
  ref_scale: 0.5
  alpha: 0.35
